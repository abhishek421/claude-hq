<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } }
    }
  </script>
  <style>
    /* ── Glass ───────────────────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* ── Session cards ───────────────────────────────── */
    .session-card {
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      cursor: default;
    }
    .session-card:hover { border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }

    /* top glow line per status */
    .session-card::before {
      content: '';
      position: absolute;
      top: 0; left: 12%; right: 12%;
      height: 1px;
    }
    .session-card.working::before  { background: linear-gradient(90deg,transparent,#3b82f6,transparent); filter: blur(1px); }
    .session-card.thinking::before { background: linear-gradient(90deg,transparent,#8b5cf6,transparent); filter: blur(1px); }
    .session-card.waiting::before  { background: linear-gradient(90deg,transparent,#f59e0b,transparent); filter: blur(1px); }
    .session-card.idle::before     { background: linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent); }
    .session-card.ended            { opacity: 0.35; }

    .session-card.working  { box-shadow: 0 4px 32px rgba(59,130,246,0.07), 0 0 0 1px rgba(59,130,246,0.08); }
    .session-card.thinking { box-shadow: 0 4px 32px rgba(139,92,246,0.07), 0 0 0 1px rgba(139,92,246,0.08); }
    .session-card.waiting  { box-shadow: 0 4px 32px rgba(245,158,11,0.1),  0 0 0 1px rgba(245,158,11,0.12); }

    /* ── Stat cards ───────────────────────────────────── */
    .stat-card {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 13px 20px;
      min-width: 96px;
    }

    /* ── Scrollbars ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }

    /* ── File tree ────────────────────────────────────── */
    .tree-item {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 6px 3px 0;
      cursor: pointer; user-select: none;
      font-size: 11.5px; font-family: 'Poppins', sans-serif;
      color: rgba(255,255,255,0.25);
      white-space: nowrap; overflow: hidden;
      border-radius: 5px;
      transition: background 0.1s, color 0.1s;
    }
    .tree-item:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.65); }
    .tree-item .indent { flex-shrink: 0; }
    .tree-item .chevron { flex-shrink: 0; width: 12px; font-size: 8px; color: rgba(255,255,255,0.12); transition: transform 0.12s; }
    .tree-item.open > .chevron { transform: rotate(90deg); }
    .tree-item .chevron.leaf { opacity: 0; }
    .tree-item .icon { flex-shrink: 0; font-size: 11px; opacity: 0.4; }
    .tree-item.dir  .name { color: rgba(196,181,253,0.65); font-weight: 500; }
    .tree-item.dir:hover .name { color: rgba(196,181,253,1); }
    .tree-item.file .name { color: rgba(255,255,255,0.2); }
    .tree-item .name { overflow: hidden; text-overflow: ellipsis; font-size: 11.5px; }
    .tree-children { display: none; }
    .tree-children.open { display: block; }

    /* ── Status badge ─────────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 9.5px; font-weight: 600; padding: 3px 9px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.07em;
    }
    .status-badge .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .status-badge.working  { background:rgba(59,130,246,0.1);  color:#60a5fa; border:1px solid rgba(59,130,246,0.18); }
    .status-badge.thinking { background:rgba(139,92,246,0.1);  color:#a78bfa; border:1px solid rgba(139,92,246,0.18); }
    .status-badge.waiting  { background:rgba(245,158,11,0.1);  color:#fbbf24; border:1px solid rgba(245,158,11,0.2); }
    .status-badge.idle     { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.22); border:1px solid rgba(255,255,255,0.07); }
    .status-badge.ended    { background:rgba(255,255,255,0.02); color:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.05); }

    .status-badge.working  .dot { background:#3b82f6; box-shadow:0 0 6px #3b82f6; animation:blink 2s infinite; }
    .status-badge.thinking .dot { background:#8b5cf6; box-shadow:0 0 6px #8b5cf6; animation:blink 2s infinite; }
    .status-badge.waiting  .dot { background:#f59e0b; box-shadow:0 0 8px #f59e0b; animation:blink 0.9s infinite; }
    .status-badge.idle     .dot { background:rgba(255,255,255,0.18); }

    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.75)} }

    /* ── Tool pill ────────────────────────────────────── */
    .tool-pill {
      font-size: 10px; color: #60a5fa;
      background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.14);
      padding: 2px 8px; border-radius: 4px;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: 'SF Mono','Fira Code',monospace;
    }

    /* ── PS source badge ──────────────────────────────── */
    .source-ps {
      font-size: 9px; color:rgba(74,222,128,0.45);
      background:rgba(74,222,128,0.05); border:1px solid rgba(74,222,128,0.1);
      border-radius:3px; padding:1px 5px;
    }

    /* ── Subagent chips ───────────────────────────────── */
    .agent-chip {
      font-size: 9px; padding: 2px 7px; border-radius: 4px;
      background:rgba(56,189,248,0.07); color:rgba(56,189,248,0.65);
      border:1px solid rgba(56,189,248,0.14); white-space:nowrap;
    }
    .agent-chip.done { background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.06); }

    /* ── Task bar ─────────────────────────────────────── */
    .task-track { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
    .task-fill  { height:100%; background:linear-gradient(90deg,#22c55e,#4ade80); border-radius:2px; transition:width 0.4s ease; }

    /* ── Activity feed ────────────────────────────────── */
    .activity-feed { border-top:1px solid rgba(255,255,255,0.04); padding-top:8px; margin-top:8px; }
    .activity-item {
      display:flex; align-items:baseline; gap:6px; padding:1.5px 0;
      font-family:'SF Mono','Fira Code',monospace; font-size:10.5px;
      color:rgba(255,255,255,0.18); white-space:nowrap; overflow:hidden;
    }
    .activity-item .a-icon { flex-shrink:0; width:12px; text-align:center; }
    .activity-item .a-text { flex:1; overflow:hidden; text-overflow:ellipsis; color:rgba(255,255,255,0.28); }
    .activity-item .a-ts   { flex-shrink:0; font-size:9px; color:rgba(255,255,255,0.1); margin-left:auto; }

    .activity-item.ev-working  .a-icon, .activity-item.ev-working  .a-text { color:rgba(96,165,250,0.65); }
    .activity-item.ev-done     .a-icon { color:rgba(74,222,128,0.55); }
    .activity-item.ev-done     .a-text { color:rgba(255,255,255,0.22); }
    .activity-item.ev-waiting  .a-icon, .activity-item.ev-waiting  .a-text { color:rgba(251,191,36,0.65); }
    .activity-item.ev-subagent .a-icon, .activity-item.ev-subagent .a-text { color:rgba(56,189,248,0.65); }
    .activity-item.ev-task     .a-icon, .activity-item.ev-task     .a-text { color:rgba(163,230,53,0.65); }
    .activity-item.ev-notif    .a-icon, .activity-item.ev-notif    .a-text { color:rgba(232,121,249,0.65); }
    .activity-item.ev-session  .a-icon, .activity-item.ev-session  .a-text { color:rgba(255,255,255,0.28); }

    /* ── Context menu ─────────────────────────────────── */
    .ctx-menu {
      position:fixed;
      background:rgba(8,8,18,0.88);
      backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
      border:1px solid rgba(255,255,255,0.1); border-radius:12px;
      padding:4px 0; min-width:205px; z-index:1000;
      box-shadow:0 20px 60px rgba(0,0,0,0.7);
      display:none; font-family:'Poppins',sans-serif;
    }
    .ctx-menu.visible { display:block; }
    .ctx-label {
      padding:7px 13px 5px; font-size:10px; color:rgba(255,255,255,0.18);
      border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:4px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:240px;
      font-family:'SF Mono','Fira Code',monospace;
    }
    .ctx-item { padding:8px 14px; font-size:12px; color:rgba(255,255,255,0.45); cursor:pointer; display:flex; align-items:center; gap:8px; font-weight:400; }
    .ctx-item:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.85); }
    .ctx-item.primary { color:rgba(167,139,250,0.8); }
    .ctx-item.primary:hover { color:#c4b5fd; }
    .ctx-item.danger  { color:rgba(248,113,113,0.7); }
    .ctx-item.danger:hover  { background:rgba(239,68,68,0.07); color:#fca5a5; }

    /* ── Toast ────────────────────────────────────────── */
    .toast {
      position:fixed; bottom:20px; right:20px;
      background:rgba(8,8,18,0.9); backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.08); border-radius:10px;
      padding:10px 16px; font-size:12px; color:rgba(255,255,255,0.45);
      z-index:2000; opacity:0; transform:translateY(8px);
      transition:opacity 0.18s,transform 0.18s; pointer-events:none;
      font-family:'Poppins',sans-serif; font-weight:500;
    }
    .toast.show    { opacity:1; transform:translateY(0); }
    .toast.success { border-color:rgba(34,197,94,0.25); color:#22c55e; }
    .toast.error   { border-color:rgba(239,68,68,0.25); color:#f87171; }

    /* ── Push button ──────────────────────────────────── */
    #push-btn {
      margin-left:10px;
      background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
      border-radius:8px; padding:5px 12px;
      font-family:'Poppins',sans-serif; font-size:11px; font-weight:500;
      cursor:pointer; color:rgba(255,255,255,0.3);
      display:flex; align-items:center; gap:6px;
      transition:background 0.15s,border-color 0.15s,color 0.15s;
    }
    #push-btn:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.55); }
    #push-btn.on  { border-color:rgba(34,197,94,0.3);  color:#22c55e; background:rgba(34,197,94,0.06); }
    #push-btn.off { border-color:rgba(239,68,68,0.3);  color:#f87171; }

    /* ── Header pulse ─────────────────────────────────── */
    @keyframes hpulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{box-shadow:0 0 0 4px rgba(34,197,94,0)} }
    .header-pulse { width:7px; height:7px; border-radius:50%; background:#22c55e; animation:hpulse 2.5s infinite; flex-shrink:0; }

    /* ── GitHub link ──────────────────────────────────── */
    #github-link { color:rgba(255,255,255,0.18); display:flex; align-items:center; transition:color 0.15s; }
    #github-link:hover { color:rgba(255,255,255,0.55); }
  </style>
</head>
<body class="bg-[#060610] font-sans min-h-screen flex flex-col text-white">

<!-- Atmospheric blobs -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
  <div style="position:absolute;top:-20%;left:-10%;width:680px;height:680px;background:radial-gradient(circle,rgba(139,92,246,0.1) 0%,transparent 70%);filter:blur(50px)"></div>
  <div style="position:absolute;bottom:-20%;right:-10%;width:680px;height:680px;background:radial-gradient(circle,rgba(59,130,246,0.09) 0%,transparent 70%);filter:blur(50px)"></div>
  <div style="position:absolute;top:45%;left:38%;transform:translate(-50%,-50%);width:380px;height:380px;background:radial-gradient(circle,rgba(16,185,129,0.04) 0%,transparent 70%);filter:blur(60px)"></div>
</div>

<!-- Header -->
<header class="glass flex items-center gap-3 px-5 py-3 border-b border-white/[0.05] flex-shrink-0">
  <div class="header-pulse"></div>
  <h1 class="text-[15px] font-semibold tracking-wide">
    Claude <span class="text-white/30 font-light">Ops</span>
  </h1>
  <span class="text-[10.5px] text-white/[0.12] ml-1" id="updated">—</span>
  <a href="https://github.com/abhishek421/claude-ops" target="_blank" id="github-link" class="ml-auto" title="View on GitHub">
    <svg height="17" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
  <button id="push-btn">🔔 Enable alerts</button>
</header>

<!-- Layout -->
<div class="flex flex-1 overflow-hidden">

  <!-- File browser -->
  <aside class="w-[255px] flex-shrink-0 flex flex-col overflow-hidden border-r border-white/[0.04]" style="background:rgba(255,255,255,0.008)">
    <div class="px-3 py-2.5 text-[9px] font-semibold text-white/[0.14] uppercase tracking-[0.14em] border-b border-white/[0.04] flex-shrink-0">
      Files — ~/
    </div>
    <div class="overflow-y-auto flex-1 p-1.5" id="file-tree">
      <div class="text-[11px] text-white/[0.12] px-2 py-2">Loading…</div>
    </div>
  </aside>

  <!-- Sessions -->
  <main class="flex-1 overflow-y-auto p-5">

    <div id="attention-banner" style="display:none"
      class="mb-4 px-4 py-3 rounded-xl text-[12px] text-amber-300/80 font-medium"
      style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.18)">
    </div>

    <!-- Stats -->
    <div class="flex gap-2.5 mb-5 flex-wrap">
      <div class="stat-card">
        <div class="text-[22px] font-semibold text-white/60 leading-none" id="st-total">0</div>
        <div class="text-[9px] font-medium text-white/[0.18] uppercase tracking-[0.12em] mt-1">Sessions</div>
      </div>
      <div class="stat-card">
        <div class="text-[22px] font-semibold text-blue-400 leading-none" id="st-working">0</div>
        <div class="text-[9px] font-medium text-white/[0.18] uppercase tracking-[0.12em] mt-1">Working</div>
      </div>
      <div class="stat-card">
        <div class="text-[22px] font-semibold text-violet-400 leading-none" id="st-thinking">0</div>
        <div class="text-[9px] font-medium text-white/[0.18] uppercase tracking-[0.12em] mt-1">Thinking</div>
      </div>
      <div class="stat-card">
        <div class="text-[22px] font-semibold text-amber-400 leading-none" id="st-waiting">0</div>
        <div class="text-[9px] font-medium text-white/[0.18] uppercase tracking-[0.12em] mt-1">Needs input</div>
      </div>
    </div>

    <!-- Grid -->
    <div id="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:10px">
      <div class="text-center text-white/[0.12] text-[13px] py-16" style="grid-column:1/-1">
        No active sessions. Start Claude in a folder to see it here.
      </div>
    </div>

  </main>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-label" id="ctx-label"></div>
  <div class="ctx-item primary" id="ctx-launch" style="display:none">▶ Start new Claude session</div>
  <div class="ctx-item"         id="ctx-reveal" style="display:none">⌥ Reveal in Finder</div>
  <div class="ctx-item danger"  id="ctx-kill"   style="display:none">✕ Kill session</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Utilities ───────────────────────────────────────────────────────────────

function shortPath(p) { return p.replace(/^\/Users\/[^/]+/, '~'); }

function ago(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 5)    return 'now';
  if (s < 60)   return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m`;
  return `${Math.floor(s/3600)}h`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Activity ────────────────────────────────────────────────────────────────

const ICON_CLASS = {
  '→':'ev-working', '✓':'ev-done', '⚠':'ev-waiting',
  '⎇':'ev-subagent', '◉':'ev-task', '🔔':'ev-notif',
  '◎':'ev-session', '■':'ev-session', '◌':'ev-session', '⇢':'ev-session',
};

function renderActivity(items) {
  if (!items.length) return '';
  return `<div class="activity-feed">${
    items.map(a => {
      const cls = ICON_CLASS[a.icon] || '';
      return `<div class="activity-item ${cls}">
        <span class="a-icon">${a.icon}</span>
        <span class="a-text">${esc(a.summary)}</span>
        <span class="a-ts">${ago(a.ts)}</span>
      </div>`;
    }).join('')
  }</div>`;
}

// ─── Sessions ────────────────────────────────────────────────────────────────

const STATUS_LABEL = { working:'Working', thinking:'Thinking', waiting:'Needs input', idle:'Idle', ended:'Ended' };

async function refreshSessions() {
  try {
    const { sessions, updatedAt } = await fetch('/api/sessions').then(r => r.json());

    document.getElementById('st-total').textContent   = sessions.filter(s => s.status !== 'ended').length;
    document.getElementById('st-working').textContent  = sessions.filter(s => s.status === 'working').length;
    document.getElementById('st-thinking').textContent = sessions.filter(s => s.status === 'thinking').length;
    document.getElementById('st-waiting').textContent  = sessions.filter(s => s.status === 'waiting').length;
    document.getElementById('updated').textContent     = new Date(updatedAt).toLocaleTimeString();

    const needsInput = sessions.filter(s => s.status === 'waiting');
    const banner = document.getElementById('attention-banner');
    if (needsInput.length) {
      banner.style.display = 'block';
      banner.style.background = 'rgba(245,158,11,0.06)';
      banner.style.border = '1px solid rgba(245,158,11,0.18)';
      banner.style.borderRadius = '10px';
      banner.style.padding = '10px 14px';
      banner.style.fontSize = '12px';
      banner.style.color = 'rgba(251,191,36,0.85)';
      banner.style.marginBottom = '16px';
      banner.innerHTML = `<strong style="color:rgba(253,224,71,0.9)">${needsInput.length} session${needsInput.length > 1 ? 's' : ''} need${needsInput.length === 1 ? 's' : ''} confirmation:</strong> ${needsInput.map(s => shortPath(s.cwd)).join(', ')}`;
    } else {
      banner.style.display = 'none';
    }

    const grid = document.getElementById('grid');
    if (!sessions.length) {
      grid.innerHTML = `<div class="text-center text-white/[0.12] text-[13px] py-16" style="grid-column:1/-1">No active sessions. Start Claude in a folder to see it here.</div>`;
      return;
    }

    grid.innerHTML = sessions.map(s => {
      const label = STATUS_LABEL[s.status] || s.status;

      const sourcePill = s.source === 'ps' ? `<span class="source-ps">ps</span>` : '';
      const toolPill   = s.currentTool ? `<span class="tool-pill">${esc(s.currentTool)}</span>` : '';

      let subRow = '';
      if (s.subagents.active > 0 || s.subagents.total > 0) {
        const chips = s.subagents.types.map(t => `<span class="agent-chip">${esc(t)}</span>`).join('');
        const done  = s.subagents.total - s.subagents.active;
        const doneChip = done > 0 ? `<span class="agent-chip done">+${done} done</span>` : '';
        subRow = `<div class="flex items-center gap-1.5 flex-wrap mb-2">
          <span style="font-size:9.5px;color:rgba(255,255,255,0.2);font-weight:500;text-transform:uppercase;letter-spacing:.08em">⎇ agents</span>
          ${chips}${doneChip}
        </div>`;
      }

      let taskRow = '';
      if (s.tasks.total > 0) {
        const pct = Math.round((s.tasks.done / s.tasks.total) * 100);
        taskRow = `<div class="mb-2.5">
          <div class="flex justify-between mb-1" style="font-size:9.5px;color:rgba(255,255,255,0.2)">
            <span style="font-weight:500;text-transform:uppercase;letter-spacing:.08em">◉ tasks</span>
            <span>${s.tasks.done} / ${s.tasks.total}</span>
          </div>
          <div class="task-track"><div class="task-fill" style="width:${pct}%"></div></div>
        </div>`;
      }

      const sidText = s.session_id.startsWith('ps:')
        ? `pid:${s.session_id.slice(3)}`
        : s.session_id.slice(0, 8);

      return `<div class="session-card ${s.status}" data-session-id="${s.session_id}" data-cwd="${esc(s.cwd)}">
        <div class="flex items-center gap-2 mb-2.5">
          <span class="status-badge ${s.status}"><span class="dot"></span>${label}</span>
          ${toolPill}
          ${sourcePill}
          <span class="ml-auto" style="font-size:9.5px;color:rgba(255,255,255,0.1);font-family:'SF Mono','Fira Code',monospace">${sidText}</span>
        </div>
        <div class="mb-2.5" style="font-family:'SF Mono','Fira Code',monospace;font-size:11.5px;color:rgba(255,255,255,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
          <span style="color:rgba(255,255,255,0.12)">dir</span> ${esc(shortPath(s.cwd))}
        </div>
        ${subRow}
        ${taskRow}
        ${renderActivity(s.activity)}
      </div>`;
    }).join('');

    document.querySelectorAll('.session-card').forEach(card => {
      card.addEventListener('contextmenu', e => {
        e.preventDefault(); e.stopPropagation();
        showCtx(e, 'session', { session_id: card.dataset.sessionId, cwd: card.dataset.cwd });
      });
    });

  } catch {
    document.getElementById('grid').innerHTML = `<div class="text-center text-white/[0.12] py-16" style="grid-column:1/-1">Cannot reach server.</div>`;
  }
}

// ─── File browser ─────────────────────────────────────────────────────────────

let BASE_DIR = '';

async function loadDir(dirPath) {
  const r = await fetch(`/api/files?path=${encodeURIComponent(dirPath)}`);
  if (!r.ok) throw new Error();
  return r.json();
}

function buildTreeItem(item, depth) {
  const indent = depth * 14;
  const div = document.createElement('div');
  div.className = `tree-item ${item.isDir ? 'dir' : 'file'}`;
  div.dataset.path = item.path;
  div.innerHTML = `
    <span class="indent" style="width:${indent}px;display:inline-block"></span>
    <span class="chevron ${item.isDir ? '' : 'leaf'}">▶</span>
    <span class="icon">${item.isDir ? '▸' : '·'}</span>
    <span class="name">${item.name}</span>
  `;

  if (!item.isDir) return { el: div, children: null };

  const kids = document.createElement('div');
  kids.className = 'tree-children';

  div.addEventListener('click', async e => {
    e.stopPropagation();
    const open = kids.classList.contains('open');
    if (open) { kids.classList.remove('open'); div.classList.remove('open'); return; }
    if (!kids.dataset.loaded) {
      kids.innerHTML = `<div class="tree-item" style="padding-left:${indent+26}px;color:rgba(255,255,255,0.1);font-size:10.5px">…</div>`;
      kids.classList.add('open'); div.classList.add('open');
      try {
        const { items } = await loadDir(item.path);
        kids.innerHTML = '';
        items.forEach(c => { const { el, children } = buildTreeItem(c, depth+1); kids.appendChild(el); if (children) kids.appendChild(children); });
        kids.dataset.loaded = '1';
      } catch {
        kids.innerHTML = `<div style="padding-left:${indent+26}px;color:rgba(239,68,68,0.5);font-size:10px">error</div>`;
      }
    } else { kids.classList.add('open'); div.classList.add('open'); }
  });

  div.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtx(e, 'file', { path: item.path }); });
  return { el: div, children: kids };
}

async function initFileTree() {
  const tree = document.getElementById('file-tree');
  try {
    if (!BASE_DIR) {
      const cfg = await fetch('/api/config').then(r => r.json());
      BASE_DIR = cfg.baseDir;
    }
    const { items } = await loadDir(BASE_DIR);
    tree.innerHTML = '';
    items.forEach(item => { const { el, children } = buildTreeItem(item, 0); tree.appendChild(el); if (children) tree.appendChild(children); });
  } catch {
    tree.innerHTML = `<div style="padding:10px 12px;color:rgba(239,68,68,0.5);font-size:10.5px">Failed to load</div>`;
  }
}

// ─── Context menu ─────────────────────────────────────────────────────────────

const ctxMenu = document.getElementById('ctx-menu');
let ctxData = null;

function showCtx(e, type, data) {
  ctxData = { type, data };
  document.getElementById('ctx-label').textContent = type === 'file' ? shortPath(data.path) : shortPath(data.cwd);
  document.getElementById('ctx-launch').style.display = type === 'file'    ? 'flex' : 'none';
  document.getElementById('ctx-reveal').style.display = type === 'file'    ? 'flex' : 'none';
  document.getElementById('ctx-kill').style.display   = type === 'session' ? 'flex' : 'none';
  ctxMenu.style.left = Math.min(e.clientX, window.innerWidth  - 220) + 'px';
  ctxMenu.style.top  = Math.min(e.clientY, window.innerHeight - 130) + 'px';
  ctxMenu.classList.add('visible');
}

function hideCtx() { ctxMenu.classList.remove('visible'); ctxData = null; }

document.getElementById('ctx-launch').addEventListener('click', async () => {
  if (!ctxData) return;
  const p = ctxData.data.path; hideCtx();
  const r = await fetch('/api/launch-claude', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ path:p }) });
  r.ok ? toast('Session launched', 'success') : toast('Launch failed', 'error');
});

document.getElementById('ctx-reveal').addEventListener('click', () => {
  if (!ctxData) return;
  fetch('/api/reveal', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ path:ctxData.data.path }) });
  hideCtx();
});

document.getElementById('ctx-kill').addEventListener('click', async () => {
  if (!ctxData) return;
  const id = ctxData.data.session_id; hideCtx();
  const r = await fetch('/api/kill', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ session_id:id }) });
  if (r.ok) { toast('Session killed', 'success'); refreshSessions(); }
  else { const { error } = await r.json(); toast('Error: ' + error, 'error'); }
});

document.addEventListener('click', hideCtx);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideCtx(); });

// ─── Toast ───────────────────────────────────────────────────────────────────

let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── Push notifications ───────────────────────────────────────────────────────

let _swReg = null, _pushSub = null;

function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function initPush() {
  const btn = document.getElementById('push-btn');
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    btn.textContent = '🔔 Not supported'; btn.disabled = true; return;
  }
  _swReg = await navigator.serviceWorker.register('/sw.js');
  _pushSub = await _swReg.pushManager.getSubscription();
  updatePushBtn();
  btn.addEventListener('click', togglePush);
}

function updatePushBtn() {
  const btn = document.getElementById('push-btn');
  if (_pushSub) { btn.textContent = '🔔 Alerts on'; btn.className = 'on'; }
  else          { btn.textContent = '🔕 Enable alerts'; btn.className = ''; }
}

async function togglePush() {
  if (_pushSub) {
    await fetch('/api/push/unsubscribe', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ endpoint:_pushSub.endpoint }) });
    await _pushSub.unsubscribe();
    _pushSub = null; updatePushBtn(); toast('Push alerts disabled');
  } else {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { toast('Permission denied', 'error'); document.getElementById('push-btn').className = 'off'; return; }
    const { key } = await fetch('/api/push/vapid-public-key').then(r => r.json());
    _pushSub = await _swReg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(key) });
    await fetch('/api/push/subscribe', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(_pushSub) });
    updatePushBtn(); toast('Push alerts enabled', 'success');
  }
}

// ─── Init ────────────────────────────────────────────────────────────────────

initFileTree();
initPush();
refreshSessions();
setInterval(refreshSessions, 2000);
</script>
